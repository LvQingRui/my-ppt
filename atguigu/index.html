<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <title>双拼输入法分享</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- reveal.js 样式 -->
  <link rel="stylesheet" href="../reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="../reveal.js/dist/theme/white.css">
</head>

<body>
  <div class="reveal">
    <div class="slides">

      <!-- 这里加载 Markdown -->
      <section data-markdown="slides.md" data-separator="^---$" data-separator-vertical="^--$"
        data-separator-notes="^Note:">
      </section>

    </div>
  </div>

  <!-- reveal.js 核心 -->
  <script src="../reveal.js/dist/reveal.js"></script>

  <!-- 插件 -->
  <script src="../reveal.js/dist/plugin/markdown.js"></script>
  <script src="../reveal.js/dist/plugin/highlight.js"></script>
  <script src="../reveal.js/dist/plugin/notes.js"></script>

  <script>
    Reveal.initialize({
      hash: true,          // URL 控制页码
      slideNumber: true,   // 显示页码
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
    });
  </script>
</body>

</html>
